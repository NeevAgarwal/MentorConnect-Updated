<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaSphere — Login</title>
  <link rel="stylesheet" href="auth.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

 <div id="vanta-bg"></div>

  <nav class="auth-nav">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon"><i data-lucide="lightbulb"></i></div>
      <span class="logo-text">IdeaSphere</span>
    </a>
    <span class="nav-hint">Don't have an account? <a href="signup.html">Sign up</a></span>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Log in to continue your learning journey</p>
      </div>

      <div class="tab-toggle">
        <button class="tab-btn active" id="tabEmail" onclick="switchTab('email')">Email</button>
        <button class="tab-btn" id="tabOtp" onclick="switchTab('otp')">Mobile OTP</button>
      </div>

      <!-- Email Form -->
      <form id="emailForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required/>
          <span class="field-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="loginPassword" placeholder="Enter your password" required/>
            <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)">
              <i data-lucide="eye"></i>
            </button>
          </div>
          <span class="field-error" id="passErr"></span>
        </div>
        <div class="form-row">
          <label class="checkbox-label"><input type="checkbox" id="rememberMe"/> Remember me</label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit">
          <span id="emailBtnText">Log In</span>
          <span id="emailSpinner" class="spinner hidden"></span>
        </button>
      </form>

      <!-- OTP Form -->
      <form id="otpForm" class="hidden" onsubmit="verifyPhoneOtp(event)">
        <div class="form-group">
          <label>Mobile Number</label>
          <div class="phone-wrap">
            <span class="country-code">🇮🇳 +91</span>
            <input type="tel" id="loginPhone" placeholder="Enter 10-digit number" maxlength="10"/>
          </div>
          <span class="field-error" id="phoneErr"></span>
        </div>
        <div id="recaptcha-container"></div>
        <div class="form-group hidden" id="otpInputGroup">
          <label>Enter OTP</label>
          <div class="otp-boxes" id="loginOtpBoxes">
            <input class="otp-box" type="text" maxlength="1"/>
            <input class="otp-box" type="text" maxlength="1"/>
            <input class="otp-box" type="text" maxlength="1"/>
            <input class="otp-box" type="text" maxlength="1"/>
            <input class="otp-box" type="text" maxlength="1"/>
            <input class="otp-box" type="text" maxlength="1"/>
          </div>
          <span class="field-error" id="otpErr"></span>
          <p class="resend-text">Didn't receive? <button type="button" class="resend-btn" onclick="sendPhoneOtp()">Resend OTP</button></p>
        </div>
        <button type="button" class="btn-submit" id="sendOtpBtn" onclick="sendPhoneOtp()">
          <span id="otpBtnText">Send OTP</span>
          <span id="otpSpinner" class="spinner hidden"></span>
        </button>
        <button type="submit" class="btn-submit hidden" id="verifyOtpBtn">Verify &amp; Login</button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn-google" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-footer-text">By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
<script>
  lucide.createIcons();
  VANTA.DOTS({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200,
    minWidth: 200,
    scale: 1.0,
    scaleMobile: 1.0,
    color: 0xD4AF37,
    color2: 0x1a3a6e,
    backgroundColor: 0x060B18,
    size: 2.8,
    spacing: 28,
    showLines: true
  });
</script>
</body>
</html>
