<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — MentorConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="bg-grid"></div></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon"><svg width="18" height="18" fill="none" stroke="#060B18" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg></div><span class="logo-text">MentorConnect</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="sessions.html" class="nav-item">Sessions</a>
      <a href="mentor-analytics.html" class="nav-item active">Analytics</a>
      <a href="profile.html" class="nav-item">My Profile</a>
    </nav>
    <button class="logout-btn" id="logoutBtn">Sign Out</button>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div><h1 class="page-title">Mentor analytics</h1><p class="page-sub">Sessions, earnings, views, ratings</p></div>
      </div>
    </header>
    <div id="analyticsGate" class="glass-panel section-block" style="display:none;">
      <p>Analytics are available for mentor accounts. Switch your role to Mentor in My Profile.</p>
      <a href="profile.html" class="connect-btn">Go to profile</a>
    </div>
    <div id="analyticsBody" style="display:none;">
      <div class="stats-row" id="anCards"></div>
      <div class="analytics-charts">
        <div class="glass-panel chart-box"><canvas id="revChart"></canvas></div>
        <div class="glass-panel chart-box"><canvas id="rateChart"></canvas></div>
      </div>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/auth/auth-state.js"></script>
  <script src="mentor-analytics.js"></script>
</body>
</html>
