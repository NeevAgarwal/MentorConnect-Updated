<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaSphere - Forgot Password</title>
  <link rel="stylesheet" href="auth.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div id="vanta-bg"></div>

  <nav class="auth-nav">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon"><i data-lucide="lightbulb"></i></div>
      <span class="logo-text">IdeaSphere</span>
    </a>
    <span class="nav-hint">Remembered it? <a href="login.html">Log in</a></span>
  </nav>

  <main class="auth-main">
    <div class="auth-card">

      <!-- Step 1 -->
      <div id="step1">
        <div class="auth-header">
          <div class="step-icon-large"><i data-lucide="key-round"></i></div>
          <h1>Forgot Password?</h1>
          <p>Enter your email and we'll send you a reset link.</p>
        </div>
        <form onsubmit="sendResetEmail(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="resetEmail" placeholder="you@example.com" required/>
            <span class="field-error" id="resetEmailErr"></span>
          </div>
          <button type="submit" class="btn-submit">
            <span id="resetBtnText">Send Reset Link</span>
            <span id="resetSpinner" class="spinner hidden"></span>
          </button>
        </form>
      <p class="back-link"><a href="login.html">Back to Login</a></p>
      </div>

      <!-- Step 2 -->
      <div id="step2" class="hidden success-screen">
        <div class="step-icon-large"><i data-lucide="mail-check"></i></div>
        <h1>Check your inbox!</h1>
        <p id="resetSentMsg">We've sent a password reset link to your email.</p>
        <div class="reset-note">
          <p>Didn't receive it? Check spam or <button class="resend-btn" onclick="goToStep(1)">try a different email</button></p>
        </div>
        <a href="login.html" class="btn-submit" style="display:flex; text-align:center; text-decoration:none; margin-top:24px;">Back to Login</a>
      </div>

    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
<script>
  lucide.createIcons();
  VANTA.DOTS({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200,
    minWidth: 200,
    scale: 1.0,
    scaleMobile: 1.0,
    color: 0xD4AF37,
    color2: 0x1a3a6e,
    backgroundColor: 0x060B18,
    size: 2.8,
    spacing: 28,
    showLines: true
  });
</script>
</body>
</html>
