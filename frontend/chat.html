<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - MentorConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="chat.css" />
</head>
<body class="chat-page">
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="bg-grid"></div></div>

  <aside class="chat-sidebar glass-panel" id="convSidebar">
    <div class="chat-side-head">
      <a href="dashboard.html" class="back-link">Back to Dashboard</a>
      <h2>Messages</h2>
    </div>
    <div id="convList" class="conv-list"></div>
  </aside>

  <main class="chat-main">
    <header class="chat-topbar glass-panel">
      <div>
        <div id="chatPeerName" class="chat-peer">Select a conversation</div>
        <div id="chatPeerStatus" class="chat-peer-status">Choose a thread to continue</div>
      </div>
      <div id="typingInd" class="typing-ind"></div>
    </header>
    <div id="msgThread" class="msg-thread"></div>
    <div class="chat-composer glass-panel">
      <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
      <button type="button" id="sendBtn" class="connect-btn">Send</button>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
    if (!window.io) {
      document.write('<script src="' + (window.MC_API || 'http://localhost:5000') + '/socket.io/socket.io.js"><\/script>');
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="api.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/auth/auth-state.js"></script>
  <script src="chat.js"></script>
</body>
</html>
